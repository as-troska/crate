    <script>
        //  const query = window.location.search.substring(1);

       fetch("http://localhost:8080/discogs/getCollection")
        .then((res) => res.json())
        .then((res) => {
            console.log(res)
            for (albums of res.releases) {
                let album = document.createElement("img");
                album.src = albums.basic_information.cover_image;
                album.style.width = "300px";
                album.style.height = "300px";
                document.body.appendChild(album)
            }
        })


    </script>
